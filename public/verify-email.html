<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Verify your FreelancerHub email address.">
    <title>Verify Email — FreelancerHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/advanced.css">
    <link rel="stylesheet" href="/css/theme.css">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; }
        .ve-page { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:100px 20px 60px; }
        .ve-card { background:rgba(8,12,28,0.88); backdrop-filter:blur(30px); border:1px solid rgba(168,85,247,0.22); border-radius:28px; padding:48px 44px; width:100%; max-width:480px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.5),0 0 80px rgba(168,85,247,0.08); animation:cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both; position:relative; overflow:hidden; }
        .ve-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,rgba(168,85,247,0.9) 30%,rgba(34,211,238,0.8) 60%,transparent); }
        @keyframes cardIn { from{opacity:0;transform:translateY(24px)scale(0.97);}to{opacity:1;transform:none;} }
        .ve-icon { width:88px; height:88px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2.8rem; margin:0 auto 24px; }
        .ve-icon.loading { background:linear-gradient(135deg,rgba(124,58,237,0.2),rgba(6,182,212,0.2)); border:2px solid rgba(168,85,247,0.3); }
        .ve-icon.success { background:linear-gradient(135deg,rgba(16,185,129,0.2),rgba(5,150,105,0.1)); border:2px solid rgba(16,185,129,0.4); }
        .ve-icon.errored { background:linear-gradient(135deg,rgba(239,68,68,0.15),rgba(220,38,38,0.1)); border:2px solid rgba(239,68,68,0.3); }
        .spinner { width:40px; height:40px; border:3px solid rgba(168,85,247,0.2); border-top-color:#a855f7; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
        @keyframes spin { to{transform:rotate(360deg);} }
        h1 { font-size:1.7rem; font-weight:800; background:linear-gradient(135deg,#fff,#c4b5fd 60%,#67e8f9); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin:0 0 12px; }
        .subtitle { color:rgba(148,163,184,0.8); font-size:0.9rem; margin:0 0 32px; line-height:1.6; }
        .btn-go { display:inline-block; padding:14px 32px; border-radius:14px; background:linear-gradient(135deg,#7c3aed,#06b6d4); color:white; font-weight:700; font-size:0.95rem; text-decoration:none; margin-top:8px; transition:all 0.3s; box-shadow:0 4px 20px rgba(124,58,237,0.4); font-family:inherit; }
        .btn-go:hover { transform:translateY(-2px); }
        .resend-section { margin-top:28px; padding-top:24px; border-top:1px solid rgba(168,85,247,0.1); }
        .resend-section p { font-size:0.85rem; color:rgba(148,163,184,0.6); margin:0 0 12px; }
        .resend-input { width:100%; box-sizing:border-box; padding:12px 16px; border-radius:12px; background:rgba(3,6,15,0.65); border:1.5px solid rgba(168,85,247,0.15); color:#e2e8f0; font-size:0.9rem; outline:none; margin-bottom:10px; font-family:inherit; transition:border-color 0.2s; }
        .resend-input:focus { border-color:rgba(124,58,237,0.6); }
        .resend-btn { width:100%; padding:12px; border-radius:12px; background:rgba(124,58,237,0.8); color:white; font-weight:600; font-size:0.9rem; border:none; cursor:pointer; transition:all 0.2s; font-family:inherit; }
        .resend-btn:hover:not(:disabled) { background:rgba(124,58,237,1); }
        .resend-btn:disabled { opacity:0.6; cursor:not-allowed; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="navbar-brand"><div class="logo-icon">&#9670;</div><span>FreelancerHub</span></a>
        <div class="navbar-right">
            <a href="/login.html" class="btn btn-outline btn-sm">Sign In</a>
            <a href="/register.html" class="btn btn-primary btn-sm">Get Started</a>
        </div>
    </nav>
    <div class="toast-container" id="toastContainer"></div>
    <div class="orb-mid"></div>

    <main class="ve-page">
        <div class="ve-card">
            <div class="ve-icon loading" id="veIcon"><div class="spinner"></div></div>
            <h1 id="veTitle">Verifying…</h1>
            <p class="subtitle" id="veSub">Please wait while we confirm your email address.</p>
            <div id="veActions"></div>
            <div class="resend-section" id="resendSection" style="display:none;">
                <p>Link expired or not working? Get a new one:</p>
                <input type="email" class="resend-input" id="resendEmail" placeholder="Enter your email address" autocomplete="email">
                <button class="resend-btn" id="resendBtnEl" onclick="resend()">&#128260; Resend Verification Email</button>
            </div>
        </div>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const token = new URLSearchParams(location.search).get('token');

        function setStatus(type, icon, title, sub, actions) {
            const ic = document.getElementById('veIcon');
            ic.className = `ve-icon ${type}`;
            ic.innerHTML = icon;
            document.getElementById('veTitle').textContent = title;
            document.getElementById('veSub').textContent = sub;
            document.getElementById('veActions').innerHTML = actions;
        }

        async function verify() {
            if (!token) {
                setStatus('errored','❌','Invalid Link','No verification token found in this URL.','<a href="/register.html" class="btn-go">Create Account</a>');
                document.getElementById('resendSection').style.display = 'block';
                return;
            }
            try {
                const r = await fetch(`${window.API_BASE}/auth/verify-email?token=${encodeURIComponent(token)}`);
                const d = await r.json();
                if (r.ok) {
                    setStatus('success','✅','Email Verified!','Your email has been confirmed. You can now sign in and access all features.','<a href="/login.html" class="btn-go">Sign In Now →</a>');
                } else if (d.error === 'already_verified') {
                    setStatus('success','✅','Already Verified','Your email is already verified. Just sign in to access your account.','<a href="/login.html" class="btn-go">Sign In →</a>');
                } else if (d.error === 'expired') {
                    setStatus('errored','⏰','Link Expired','This link has expired. Request a new verification email below.','');
                    document.getElementById('resendSection').style.display = 'block';
                } else {
                    setStatus('errored','❌','Verification Failed',d.message||'Invalid link. Please try again.','<a href="/register.html" class="btn-go">Register Again</a>');
                    document.getElementById('resendSection').style.display = 'block';
                }
            } catch(e) {
                setStatus('errored','⚠️','Network Error','Could not connect. Please check your connection and try again.','<button class="btn-go" onclick="verify()">Retry</button>');
            }
        }

        async function resend() {
            const email = document.getElementById('resendEmail').value.trim();
            if (!email) { showToast('Please enter your email address','error'); return; }
            const btn = document.getElementById('resendBtnEl');
            btn.disabled=true; btn.textContent='Sending…';
            try {
                const d = await apiFetch('/auth/resend-verification', { method:'POST', body:JSON.stringify({ email }) });
                showToast(d.message||'Verification email sent!','success');
                btn.textContent='✅ Sent!';
            } catch(err) {
                showToast(err.message||'Failed to send email','error');
                btn.disabled=false; btn.textContent='🔄 Resend Verification Email';
            }
        }

        verify();
    </script>
</body>
</html>
