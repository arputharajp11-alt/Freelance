<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Post a new job on FreelancerHub and find talented freelancers.">
    <title>Post a Job — FreelancerHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/advanced.css">
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/enhancements.css">
</head>

<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="logo-icon">&#9670;</div><span>FreelancerHub</span>
        </a>
        <ul class="navbar-links" id="navLinks">
            <li><a href="/jobs.html">&#128188; Jobs</a></li>
            <li><a href="/dashboard.html">&#128202; Dashboard</a></li>
        </ul>
        <div class="navbar-right">
            <a href="/login.html" class="btn btn-outline btn-sm" id="navLogin" style="display:none;">Sign In</a>
            <a href="/register.html" class="btn btn-primary btn-sm" id="navRegister" style="display:none;">Get
                Started</a>
            <button id="navWalletBtn" class="btn btn-primary btn-sm" style="display:none; margin-right:12px;"></button>
            <div class="nav-dropdown" id="navUser">
                <div class="nav-avatar" id="navAvatar" onclick="toggleDropdown()">U</div>
                <div class="nav-dropdown-menu" id="navDropdown">
                    <a href="/profile.html">&#128100; Profile</a>
                    <a href="/dashboard.html">&#128202; Dashboard</a>
                    <a href="/wallet.html">&#128176; Wallet</a>
                    <div class="nav-dropdown-divider"></div>
                    <a href="#" onclick="logout();return false;" style="color:var(--error);">&#128682; Sign Out</a>
                </div>
            </div>
            <button class="nav-toggle" onclick="toggleNav()">&#9776;</button>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>
    <div class="orb-mid"></div>

    <main class="main-content">
        <div class="container">
            <div class="post-job-form">

                <div style="margin-bottom:36px;">
                    <h1
                        style="font-size:2rem;font-weight:800;font-family:'Space Grotesk',sans-serif;margin-bottom:8px;">
                        &#43; Post a New Job
                    </h1>
                    <p style="color:var(--text-secondary);">Fill in the details below to attract the best freelancers.
                    </p>
                </div>

                <form id="postJobForm" onsubmit="handlePostJob(event)" novalidate>

                    <!-- Job Basics -->
                    <div class="form-section-title">&#128203; Job Details</div>

                    <div class="form-group">
                        <label class="form-label" for="jobTitle">Job Title *</label>
                        <input type="text" class="form-input" id="jobTitle"
                            placeholder="e.g. Build a DeFi dashboard with React & Web3.js" required maxlength="100">
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="jobDesc">Job Description *</label>
                        <textarea class="form-textarea" id="jobDesc"
                            placeholder="Describe the project, requirements, deliverables, and any important details..."
                            required style="min-height:160px;"></textarea>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div class="form-group">
                            <label class="form-label" for="jobCategory">Category *</label>
                            <select class="form-select" id="jobCategory" required>
                                <option value="">Select a category</option>
                                <option>Web Development</option>
                                <option>Mobile Development</option>
                                <option>Design</option>
                                <option>Writing</option>
                                <option>Marketing</option>
                                <option>Data Science</option>
                                <option>Blockchain</option>
                                <option>DevOps</option>
                                <option>Video &amp; Animation</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="jobExperience">Experience Level</label>
                            <select class="form-select" id="jobExperience">
                                <option value="beginner">Beginner</option>
                                <option value="intermediate" selected>Intermediate</option>
                                <option value="expert">Expert</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="jobSkills">Required Skills</label>
                        <input type="text" class="form-input" id="jobSkills"
                            placeholder="e.g. React, Solidity, Web3.js, TypeScript (comma separated)">
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-top:6px;">Separate skills with
                            commas</div>
                    </div>

                    <!-- Budget -->
                    <div class="form-section-title">&#128176; Budget & Timeline</div>

                    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;">
                        <div class="form-group">
                            <label class="form-label" for="budgetType">Budget Type</label>
                            <select class="form-select" id="budgetType">
                                <option value="fixed">Fixed Price</option>
                                <option value="hourly">Hourly Rate</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="budgetMin">Min (ETH)</label>
                            <input type="number" class="form-input" id="budgetMin" placeholder="0.0" step="0.01"
                                min="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="budgetMax">Max (ETH)</label>
                            <input type="number" class="form-input" id="budgetMax" placeholder="0.0" step="0.01"
                                min="0">
                        </div>
                    </div>

                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                        <div class="form-group">
                            <label class="form-label" for="jobDuration">Duration</label>
                            <select class="form-select" id="jobDuration">
                                <option value="less_1_week">Less than 1 week</option>
                                <option value="1_2_weeks">1–2 weeks</option>
                                <option value="1_month">About 1 month</option>
                                <option value="1_3_months">1–3 months</option>
                                <option value="3_6_months">3–6 months</option>
                                <option value="ongoing">Ongoing</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="jobDeadline">Deadline (optional)</label>
                            <input type="date" class="form-input" id="jobDeadline">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="jobAttachments">Attachments (optional)</label>
                        <div id="attachmentsPreview" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;"></div>
                        <input type="file" id="jobFileInput" style="display:none;" onchange="uploadJobAttachment(this)">
                        <button type="button" class="btn btn-outline" onclick="document.getElementById('jobFileInput').click()">📎 Add File</button>
                        <input type="hidden" id="jobAttachments" value="[]">
                    </div>

                    <!-- Actions -->
                    <div style="display:flex;gap:12px;margin-top:8px;">
                        <button type="submit" class="btn btn-primary btn-lg" id="submitJobBtn">
                            &#128640; Post Job
                        </button>
                        <a href="/dashboard.html" class="btn btn-outline btn-lg">Cancel</a>
                    </div>

                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2025 FreelancerHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/app.js"></script>
    <script>
        requireAuth();
        const u = getUser();
        if (u && u.role !== 'client') {
            showToast('Only clients can post jobs', 'error');
            setTimeout(() => location.href = '/jobs.html', 1500);
        }

        let uploadedAttachments = [];

        async function uploadJobAttachment(input) {
            const file = input.files[0];
            if (!file) return;
            if (file.size > 10 * 1024 * 1024) return showToast('File too large (max 10MB)', 'error');

            const formData = new FormData();
            formData.append('file', file);

            try {
                showToast('Uploading...', 'info');
                const res = await fetch(`${API_BASE}/upload`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('fh_token')}` },
                    body: formData
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                uploadedAttachments.push(data.file.url);
                const preview = document.getElementById('attachmentsPreview');
                const chip = document.createElement('div');
                chip.className = 'skill-tag';
                chip.innerHTML = `📎 ${escapeHtml(file.name)} <span onclick="this.parentElement.remove(); uploadedAttachments = uploadedAttachments.filter(u => u !== '${data.file.url}')" style="cursor:pointer;margin-left:5px;">×</span>`;
                preview.appendChild(chip);
                input.value = '';
            } catch (e) {
                showToast(e.message || 'Upload failed', 'error');
            }
        }

        function handlePostJob(e) {
            e.preventDefault();
            const btn = document.getElementById('submitJobBtn');
            btn.disabled = true; btn.textContent = 'Posting...';

            const title = document.getElementById('jobTitle').value.trim();
            const desc = document.getElementById('jobDesc').value.trim();
            const category = document.getElementById('jobCategory').value;
            const skills = document.getElementById('jobSkills').value.split(',').map(s => s.trim()).filter(Boolean);
            const budgetType = document.getElementById('budgetType').value;
            const budgetMin = parseFloat(document.getElementById('budgetMin').value) || 0;
            const budgetMax = parseFloat(document.getElementById('budgetMax').value) || 0;
            const duration = document.getElementById('jobDuration').value;
            const experience = document.getElementById('jobExperience').value;
            const deadline = document.getElementById('jobDeadline').value || null;

            if (!title || !desc || !category) {
                showToast('Please fill in Title, Description, and Category', 'error');
                btn.disabled = false; btn.textContent = '🚀 Post Job'; return;
            }

            postJob({ 
                title, 
                description: desc, 
                category, 
                skills_required: skills, 
                budget_type: budgetType, 
                budget_min: budgetMin, 
                budget_max: budgetMax, 
                duration, 
                experience_level: experience, 
                deadline,
                attachments: uploadedAttachments
            });
        }
    </script>
</body>

</html>
