<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="My FreelancerHub wallet — view balance, transactions, deposit and withdraw ETH.">
    <title>Wallet — FreelancerHub</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/advanced.css">
    <link rel="stylesheet" href="/css/theme.css">
</head>

<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">
            <div class="logo-icon">&#9670;</div><span>FreelancerHub</span>
        </a>
        <ul class="navbar-links" id="navLinks">
            <li><a href="/jobs.html">&#128188; Jobs</a></li>
            <li><a href="/dashboard.html">&#128202; Dashboard</a></li>
            <li><a href="/wallet.html" class="active">&#128176; Wallet</a></li>
        </ul>
        <div class="navbar-right">
            <a href="/login.html" class="btn btn-outline btn-sm" id="navLogin" style="display:none;">Sign In</a>
            <a href="/register.html" class="btn btn-primary btn-sm" id="navRegister" style="display:none;">Get
                Started</a>
            <div class="nav-dropdown" id="navUser">
                <div class="nav-avatar" id="navAvatar" onclick="toggleDropdown()">U</div>
                <div class="nav-dropdown-menu" id="navDropdown">
                    <a href="/profile.html">&#128100; Profile</a>
                    <a href="/dashboard.html">&#128202; Dashboard</a>
                    <a href="/wallet.html">&#128176; Wallet</a>
                    <div class="nav-dropdown-divider"></div>
                    <a href="#" onclick="logout();return false;" style="color:var(--error);">&#128682; Sign Out</a>
                </div>
            </div>
            <button class="nav-toggle" onclick="toggleNav()">&#9776;</button>
        </div>
    </nav>

    <div class="toast-container" id="toastContainer"></div>
    <div class="orb-mid"></div>

    <main class="main-content">
        <div class="container" style="padding-top:40px;max-width:860px;">

            <!-- Balance Card -->
            <div class="wallet-balance-card">
                <div class="wallet-balance-label">Total Balance</div>
                <div class="wallet-balance-amount">
                    <span>ETH</span>
                    <span id="walletBalance">—</span>
                </div>
                <div style="display:flex;justify-content:center;gap:24px;margin-top:20px;flex-wrap:wrap;">
                    <div style="text-align:center;">
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Total Earned</div>
                        <div style="font-weight:700;color:var(--success);" id="walletEarned">—</div>
                    </div>
                    <div style="width:1px;background:var(--border-color);"></div>
                    <div style="text-align:center;">
                        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px;">Pending</div>
                        <div style="font-weight:700;color:var(--warning);" id="walletPending">—</div>
                    </div>
                </div>
                <!-- Wallet Actions -->
                <div style="display:flex;gap:12px;justify-content:center;margin-top:24px;">
                    <button class="btn btn-primary btn-sm" onclick="withdrawFunds()">
                        &#8593; Withdraw
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="openDepositModal()">
                        &#8595; Deposit
                    </button>
                </div>
            </div>

            <!-- Stats Row -->
            <div
                style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px;">
                <div class="stat-card" style="padding:20px;">
                    <div class="stat-value" style="font-size:1.5rem;" id="totalEarned">—</div>
                    <div class="stat-label">Total Earned</div>
                </div>
                <div class="stat-card" style="padding:20px;">
                    <div class="stat-value" style="font-size:1.5rem;" id="totalSpent">—</div>
                    <div class="stat-label">Total Spent</div>
                </div>
                <div class="stat-card" style="padding:20px;">
                    <div class="stat-value" style="font-size:1.5rem;" id="txCount">—</div>
                    <div class="stat-label">Transactions</div>
                </div>
            </div>

            <!-- Transaction List -->
            <div class="card">
                <div class="flex-between mb-3">
                    <h2 style="font-size:1.1rem;font-weight:700;">&#128444; Transaction History</h2>
                    <div style="display:flex;gap:8px;">
                        <button class="tab-btn active" onclick="setTxFilter('', this)">All</button>
                        <button class="tab-btn" onclick="setTxFilter('credit', this)">Credits</button>
                        <button class="tab-btn" onclick="setTxFilter('debit', this)">Debits</button>
                    </div>
                </div>
                <div id="txList">
                    <div class="loading-overlay">
                        <div class="loading-spinner"></div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Deposit Modal -->
    <div class="modal-overlay" id="depositModal">
        <div class="modal" style="max-width:420px;">
            <div class="modal-header">
                <h2>&#8595; Deposit ETH</h2>
                <button class="modal-close" onclick="closeModal()">&#215;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Amount (ETH)</label>
                <input type="number" class="form-input" id="depositAmount" step="0.001" placeholder="0.00">
            </div>
            <div class="form-group">
                <label class="form-label">Transaction Hash (optional)</label>
                <input type="text" class="form-input" id="depositTxHash" placeholder="0x...">
            </div>
            <button class="btn btn-primary btn-block" onclick="confirmDeposit()">Confirm Deposit</button>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2025 FreelancerHub. All rights reserved.</p>
        </div>
    </footer>

    <script src="/js/config.js"></script>
    <script src="/js/theme.js"></script>
    <script src="/js/app.js"></script>
    <script>
        requireAuth();

        function setEl(id, v) { const e = document.getElementById(id); if (e) e.textContent = v; }
        let _walletData = null;

        function openDepositModal() { document.getElementById('depositModal').classList.add('show'); }

        async function confirmDeposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            const txHash = document.getElementById('depositTxHash').value.trim();
            if (!amount || amount <= 0) { showToast('Enter a valid amount', 'error'); return; }
            try {
                const d = await apiFetch('/wallet/deposit', { method: 'POST', body: JSON.stringify({ amount, tx_hash: txHash }) });
                showToast(d.message || 'Deposited!', 'success');
                closeModal();
                initWallet();
            } catch (e) { showToast(e.message || 'Deposit failed', 'error'); }
        }

        function closeModal() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('show'));
        }

        async function initWallet() {
            try {
                const d = await apiFetch('/wallet');
                _walletData = d;
                const w = d.wallet || {};
                setEl('walletBalance', parseFloat(w.balance || 0).toFixed(4));
                setEl('walletEarned', parseFloat(w.total_earned || 0).toFixed(4) + ' ETH');
                setEl('walletPending', w.pending_count + ' pending');
                setEl('totalEarned', parseFloat(w.total_earned || 0).toFixed(4) + ' ETH');
                setEl('totalSpent', parseFloat(w.total_spent || 0).toFixed(4) + ' ETH');
                setEl('txCount', (d.transactions || []).length + '');
                renderTxList(d.transactions || []);
            } catch (err) { }
        }

        function renderTxList(txs) {
            const el = document.getElementById('txList');
            if (!el) return;
            if (!txs.length) {
                el.innerHTML = '<div class="empty-state"><span class="empty-state-icon">&#128176;</span><p class="empty-state-text">No transactions yet.</p></div>';
                return;
            }
            setEl('txCount', txs.length + '+');
            el.innerHTML = txs.map(t => {
                const credit = t.type === 'credit' || t.type === 'deposit';
                return `<div class="sidebar-info-row" style="padding:12px 0;border-bottom:1px solid var(--border-color);">
                <div>
                    <div style="font-size:0.875rem;font-weight:600;">${escapeHtml(t.description || t.type)}</div>
                    <div style="font-size:0.75rem;color:var(--text-muted);margin-top:2px;">${timeAgo(t.created_at)} &middot; <span class="badge badge-${t.status}">${t.status}</span></div>
                </div>
                <div style="color:${credit ? 'var(--success)' : 'var(--error)'};font-weight:700;font-family:'Space Grotesk',sans-serif;font-size:0.95rem;">
                    ${credit ? '+' : '-'}${parseFloat(t.amount).toFixed(4)} ETH
                </div>
            </div>`;
            }).join('');
        }

        async function setTxFilter(type, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            try {
                const d = await apiFetch(`/wallet/transactions${type ? '?type=' + type : ''}`);
                renderTxList(d.transactions || []);
            } catch (e) { }
        }

        initWallet();
    </script>
</body>

</html>
